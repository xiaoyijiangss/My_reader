name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK components
        run: |
          yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null || true
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Create local.properties
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}"

      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug, O=Android, C=US"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Download Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip
          echo "$(pwd)/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Build APKs
        id: build
        run: |
          set -o pipefail
          gradle assembleRelease assembleDebug --stacktrace 2>&1 | tee build.log

      - name: Upload Build Log
        if: always() && steps.build.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            build.log
            app/build/reports/
          retention-days: 7

      - name: Upload Release APK
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: MyReader-APK-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload Debug APK
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: MyReader-APK-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
